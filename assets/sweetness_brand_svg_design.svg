<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 735 1024" width="735" height="1024" role="img" aria-label="Сладость в радость — SVG логотип без фона">
  <defs>
    <style>
      :root{ --brand:#f2385f; --brand-soft:#ff5d7e; }
      .stroke{fill:none;stroke:var(--brand);stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
      .thin{fill:none;stroke:var(--brand);stroke-width:2.05;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
      .hair{fill:none;stroke:var(--brand);stroke-width:1.45;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
      .fill{fill:var(--brand)}
      .brand-title{font-family:Georgia,'Times New Roman',serif;font-weight:700;font-size:55px;letter-spacing:-1px;fill:var(--brand)}
      .tagline{font-family:Georgia,'Times New Roman',serif;font-style:italic;font-size:26px;fill:var(--brand)}
      .phone{font-family:Georgia,'Times New Roman',serif;font-weight:700;font-size:40px;fill:var(--brand)}
      .url{font-family:Georgia,'Times New Roman',serif;font-size:35px;fill:var(--brand);text-decoration:underline}
      .mono{font-family:'Brush Script MT','Segoe Script','Snell Roundhand',cursive;font-size:76px;fill:var(--brand)}
    </style>

